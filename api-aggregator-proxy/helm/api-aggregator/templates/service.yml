apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.service.name }}"
  namespace: "{{ .Release.Namespace }}"
spec:
  type: "{{ .Values.service.type }}"
  selector:
    app: "{{ include "api-aggregator.name" . }}"
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP