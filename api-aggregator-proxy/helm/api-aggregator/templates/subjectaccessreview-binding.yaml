apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '{{ include "api-aggregator.fullname" . }}-subjectaccessreview-binding'
subjects:
- kind: ServiceAccount
  name: "{{ .Values.serviceAccount.name }}"
  namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: ClusterRole
  name: '{{ include "api-aggregator.fullname" . }}-subjectaccessreview'
  apiGroup: rbac.authorization.k8s.io